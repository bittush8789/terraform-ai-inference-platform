apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-inference-ingress
  namespace: ai-app
  annotations:
    # Use ALB ingress class
    alb.ingress.kubernetes.io/scheme: internet-facing
    
    # target-type: ip routes directly to Pod IPs, bypassing kube-proxy overhead.
    # Note: If target-type is set to 'instance', the service must be NodePort.
    alb.ingress.kubernetes.io/target-type: ip
    
    # Configure ALB health check
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-port: "8000"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/success-codes: "200"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-inference-service
                port:
                  number: 80

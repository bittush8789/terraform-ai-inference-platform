apiVersion: v1
kind: Service
metadata:
  name: ai-inference-service
  namespace: ai-app
  labels:
    app: ai-inference
spec:
  # Type LoadBalancer provisions an AWS Classic or Network Load Balancer.
  # Note: If deploying using AWS ALB Ingress, this service can be kept as NodePort or ClusterIP.
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: ai-inference

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-inference-deployment
  namespace: ai-app
  labels:
    app: ai-inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-inference
  template:
    metadata:
      labels:
        app: ai-inference
    spec:
      containers:
        - name: ai-inference
          # Note: Replace <AWS_ACCOUNT_ID> with your actual AWS Account ID or let CI/CD populate this.
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/ai-inference-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
